<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Case Converter</title>
</head>
<body>
<div class="title">Case Converter</div>
<textarea id="textarea"></textarea>
<button id='upper-case'>Upper Case</button>
<button id='lower-case'>Lower Case</button>
<button id='proper-case'>Proper Case</button>
<button id='sentence-case'>Sentence Case</button>
<button id="save-text-file">Save Text File</button>
</body>
<script>
    function capitalizeFirstLetter(string) {
        return string.charAt(0).toUpperCase() + string.slice(1);
    }
    document.getElementById("upper-case").addEventListener("click", () => {
        let textareaValue = document.getElementById("textarea").value;
        document.getElementById("textarea").value = textareaValue.toUpperCase();
    })
    document.getElementById("lower-case").addEventListener("click", () => {
        let textareaValue = document.getElementById("textarea").value;
        document.getElementById("textarea").value = textareaValue.toLowerCase();
    })
    document.getElementById("proper-case").addEventListener("click", () => {
        let textareaValue = document.getElementById("textarea").value;
        textareaValue = textareaValue.toLowerCase().split(" ").map(item => capitalizeFirstLetter(item)).join(" ");
        document.getElementById("textarea").value = textareaValue;
    })
    document.getElementById("sentence-case").addEventListener("click", () => {
        let sentenceCase = document.getElementById("textarea").value;
        let sentence = sentenceCase.split(". ");
        let strSentence = sentence.map((word1) => {
            return word1[0].toUpperCase() + word1.slice(1).toLowerCase();
        }).join(". ");
        document.getElementById("textarea").value = strSentence;
    })
    function download(filename, text) {
        let element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', filename);

        element.style.display = 'none';
        document.body.appendChild(element);

        element.click();

        document.body.removeChild(element);
    }
    document.getElementById("save-text-file").addEventListener("click", function() {
        let text = document.getElementById("textarea").value;
        let filename = "text.txt"
        download("text.txt", text);
    }, false);

    // Start file download.
    download("text.txt","This is the content of my file :)");
</script>
</html>
